{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;text-align:center;padding:2rem;">
  <div style="font-size:5rem;">⚙️</div>
  <h1 style="font-size:2.5rem;font-weight:800;color:var(--text-primary);">500 — Server Error</h1>
  <p style="color:var(--text-secondary);max-width:400px;">Something went wrong on our end. Our team has been notified. Please try again shortly.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
