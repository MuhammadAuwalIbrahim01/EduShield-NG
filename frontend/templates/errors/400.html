{% extends "base.html" %}
{% block title %}Bad Request{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;text-align:center;padding:2rem;">
  <div style="font-size:5rem;">🚧</div>
  <h1 style="font-size:2.5rem;font-weight:800;color:var(--text-primary);">400 — Bad Request</h1>
  <p style="color:var(--text-secondary);max-width:400px;">The request could not be understood. This may be a CSRF token error — please refresh and try again.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
